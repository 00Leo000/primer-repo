<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patitas</title>
    <link rel="stylesheet" href="miau.css">
    <style>
        /* ESTILOS DIRECTOS PARA QUE FUNCIONE LADO A LADO */
        .contenedor-fila {
            display: flex;
            flex-direction: row; /* Los pone horizontales */
            gap: 20px;           /* Espacio entre ellos */
            flex-wrap: wrap;     /* Si la pantalla es chica, se ponen verticales */
        }
        
        .form-wrapper {
            flex: 1;             /* Todos del mismo ancho */
            min-width: 280px;    /* Evita que se deformen */
            background-color: #f9f9f9; /* Color de fondo suave opcional */
            padding: 20px;
            border-radius: 8px;
        }

        .buttons {
    width: 100%;
    margin-top: 30px;
    padding: 20px;
    background-color: transparent; /* <-- Cambia #eee por transparent */
}
    </style>
</head>
<body>

    <header>
        <h1>Formularios Patitas</h1>
        <p>El centro de tu cuidado Gatuno 😽</p>
    </header>

    <main class="main-container">
        
        <form action="#" method="POST">

            <div class="contenedor-fila">

                <div class="form-wrapper">
    <h2>Datos del dueño: 🐾</h2>
    <div class="form-group">
        <label for="nombre">Nombre Completo:</label>
        <input type="text" id="nombre" name="nombre" placeholder="Ej: Juan Pérez" required minlength="3">
    </div>
    
                    <div class="form-group">
                        <label for="email">Correo Electrónico:</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono:</label>
                        <input type="tel" id="telefono" name="telefono" required>
                    </div>
                    <div class="form-group">
                        <label for="genero_dueño">Género:</label>
                        <select id="genero_dueño" name="genero_dueño" required>
                            <option value="">Seleccione...</option>
                            <option value="m">Masculino</option>
                            <option value="f">Femenino</option>
                            <option value="o">Otro</option>
                        </select>
                    </div>
                </div>

                <div class="form-wrapper">
                    <h2>Datos de tu amigo peludo 🐾</h2>
                    <div class="form-group">
                        <label for="nombre-mascota">Nombre de tu mascota:</label>
                        <input type="text" id="nombre-mascota" name="nombre-mascota" required minlength="3">
                    </div>
                    <div class="form-group">
                        <label for="edad-mascota">Edad (años):</label>
                        <input type="number" id="edad-mascota" name="edad-mascota" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="genero_mascota">Sexo:</label>
                        <select id="genero_mascota" name="genero_mascota" required>
                            <option value="">Seleccione...</option>
                            <option value="m">Masculino</option>
                            <option value="f">Femenino</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="raza">Raza:</label>
                        <select id="raza" name="raza" required onchange="verificarOtro(this)">
                            <option value="">Seleccione...</option>
                            <option value="m">Persa</option>
                            <option value="f">Siames</option>
                            <option value="otro">Otro</option> 
                        </select>
                    </div>
                    <div id="div_otra_raza" style="display: none; margin-top: 10px;">
                        <label for="otra_raza_texto">Especifique la raza:</label>
                        <input type="text" id="otra_raza_texto" name="otra_raza_texto">
                    </div>
                </div>

                <div class="form-wrapper">
                    <h2>Contáctanos</h2>
                    <div class="form-group">
                        <label for="asunto">Asunto:</label>
                        <input type="text" id="asunto" name="asunto" required>
                    </div>
                    <div class="form-group">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                    </div>
                </div>

            </div> <div class="buttons">
                <button type="submit" class="btn-submit">Enviar Todo</button>
                <button type="reset" class="btn-reset">Limpiar Todo</button>
            </div>

        </form> 
    </main
